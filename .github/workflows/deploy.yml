name: Production Deployment
on:
  push:
    branches:
      - main
      - energy-trading-platform-v1

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Backend Dependencies
        run: |
          npm install -g wrangler
          cd cloudflare-platform
          npm install

      - name: Deploy Backend and Durable Objects
        run: |
          cd cloudflare-platform
          npx wrangler deploy

      - name: Run Database Migrations
        run: |
          cd cloudflare-platform
          npx wrangler d1 migrations apply DB --remote

      - name: Install Frontend Dependencies
        run: |
          cd cloudflare-platform/pages
          npm install

      - name: Build Frontend
        run: |
          cd cloudflare-platform/pages
          npm run build

      - name: Deploy Frontend
        run: |
          cd cloudflare-platform
          npx wrangler pages deploy dist --project-name nxt-energy-trading-platform --branch production
