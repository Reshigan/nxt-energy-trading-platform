name = "nxt-energy-trading-api"
main = "src/index.ts"
compatibility_date = "2023-10-01"

# Route configuration for custom domain
routes = [
  { pattern = "et.vantax.co.za/api/*", zone_name = "vantax.co.za" }
]

[vars]
ENVIRONMENT = "production"
API_BASE_URL = "https://et.vantax.co.za/api"

[[kv_namespaces]]
binding = "KV"
id = "0fd4da205bb54e8db8340c51c8865787"

[[d1_databases]]
binding = "DB"
database_name = "nxt_energy_trading"
database_id = "caa3ae48-3bdc-473b-b197-62c59288d9a9"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "nxt-energy-assets"
preview_bucket_name = "nxt-energy-assets-preview"

[observability]
enabled = true
head_sampling_rate = 1

# Development environment
[env.development]
[env.development.vars]
ENVIRONMENT = "development"
API_BASE_URL = "http://localhost:8787"
