<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NXT Energy Trading Platform | Award-Winning Energy Trading</title>
    <meta name="description" content="World's best energy trading platform with AI-powered insights, digital contracts, and carbon credit marketplace">
    <meta name="theme-color" content="#d4e157">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --energy-primary: #d4e157;
        --energy-secondary: #b8c43a;
        --energy-accent: #4caf50;
        --dark-bg: #0f172a;
        --dark-card: #1e293b;
        --dark-text: #f1f5f9;
        --glass-bg: rgba(30, 41, 59, 0.7);
        --glass-border: rgba(255, 255, 255, 0.1);
      }
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--dark-bg);
        color: var(--dark-text);
        min-height: 100vh;
        background-image: 
                    radial-gradient(circle at 10% 20%, rgba(212, 225, 87, 0.08) 0%, transparent 20%),
                    radial-gradient(circle at 90% 80%, rgba(76, 175, 80, 0.08) 0%, transparent 20%);
      }
      
      .glass {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(2, 12, 25, 0.2);
      }
      
      .gradient-text {
            background: linear-gradient(90deg, var(--energy-primary), var(--energy-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
          }
        </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
