<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-96x96.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NXT Energy" />
    <title>NXT Energy Trading Platform | Award-Winning Energy Trading</title>
    <meta name="description" content="South Africa's premier energy trading platform with AI-powered portfolio optimisation, digital contracts, carbon credit marketplace, and IoT metering">
    <meta name="theme-color" content="#0a1628">
    <!-- Phase 6.7: SEO Open Graph & Twitter Cards -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="NXT Energy Trading Platform">
    <meta property="og:description" content="South Africa's premier energy trading platform. Trade renewable energy, carbon credits, and manage contracts with AI-powered insights.">
    <meta property="og:url" content="https://et.vantax.co.za">
    <meta property="og:site_name" content="NXT Energy">
    <meta property="og:image" content="https://et.vantax.co.za/icons/icon-512x512.png">
    <meta property="og:locale" content="en_ZA">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="NXT Energy Trading Platform">
    <meta name="twitter:description" content="South Africa's premier energy trading platform with AI-powered portfolio optimisation.">
    <meta name="twitter:image" content="https://et.vantax.co.za/icons/icon-512x512.png">
    <link rel="canonical" href="https://et.vantax.co.za">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // Prevent FOUC: apply saved theme before first paint
      (function() {
        var t = localStorage.getItem('nxt_theme') || 'light';
        if (t === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      })();
    </script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'DM Sans', 'Inter', sans-serif; min-height: 100vh; background: #f8fafc; color: #0f172a; }
      .dark body, html.dark body { background: #0a1628; color: #f1f5f9; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('SW registered:', reg.scope))
            .catch((err) => console.warn('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
